services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-prod
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
      - ./models:/models
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL}
      - OLLAMA_MAX_QUEUE=${OLLAMA_MAX_QUEUE}
      - OLLAMA_VULKAN=0
      - MALLOC_ARENA_MAX=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    networks:
      - proxy
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT}
        reservations:
          memory: ${MEMORY_RESERVATION}

  ollama-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ollama-webui-prod
    restart: unless-stopped
    networks:
      - proxy
    environment:
      - OLLAMA_BASE_URL=""
      - OPENAI_API_BASE_URL=http://litellm:4000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
    volumes:
      - ollama_webui_data:/app/backend/data
    depends_on:
      - ollama
      - litellm
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ollama-ui.rule=Host(`ai.berguecio.cl`)"
      - "traefik.http.routers.ollama-ui.entrypoints=websecure"
      - "traefik.http.routers.ollama-ui.tls=true"
      - "traefik.http.services.ollama-ui.loadbalancer.server.port=8080"
      - "traefik.docker.network=proxy"
      - "monitoring.url=https://ai.berguecio.cl/health"

  litellm-postgres:
    image: postgres:16
    container_name: postgres-litellm-prod
    restart: unless-stopped
    networks:
      - proxy
    environment:
      - POSTGRES_DB=litellm
      - POSTGRES_USER=litellm
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST_AUTH_METHOD=md5
      - POSTGRES_INITDB_ARGS=--auth-host=md5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 30s
      timeout: 5s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-prod
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    networks:
      - proxy
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - UI_PASSWORD=${LITELLM_UI_PASSWORD}
      - DATABASE_URL=postgresql://litellm:${POSTGRES_PASSWORD}@litellm-postgres:5432/litellm
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
      - litellm_data:/app/data
    depends_on:
      litellm-postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.litellm.rule=Host(`ai-api.berguecio.cl`)"
      - "traefik.http.routers.litellm.entrypoints=websecure"
      - "traefik.http.routers.litellm.tls=true"
      - "traefik.http.services.litellm.loadbalancer.server.port=4000"
      - "traefik.docker.network=proxy"
      - "monitoring.url=https://ai-api.berguecio.cl/health"

networks:
  proxy:
    external: true

volumes:
  ollama_data:
    driver: local
  ollama_webui_data:
    driver: local
  litellm_data:
    driver: local
  postgres_data:
    driver: local
