# LiteLLM configuración - Solo Ollama local
litellm_settings:
  # Logging
  set_verbose: true
  json_logs: true

  # Rate limiting
  rpm_limit: 1000
  tpm_limit: 100000

# Configuración general
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

  # UI de admin (opcional)
  ui_username: admin
  ui_password: os.environ/LITELLM_UI_PASSWORD

# Solo Ollama - proxy dinámico para todos los modelos disponibles
model_list:

  - model_name: "gemma4:e2b"
    litellm_params:
      model: ollama/gemma4:e2b
      api_base: http://ollama:11434
      extra_body:
        think: false
    model_info:
      mode: chat

  - model_name: "gemma4:26b"
    litellm_params:
      model: ollama/gemma4:26b
      api_base: http://ollama:11434
      extra_body:
        think: false
    model_info:
      mode: chat

  - model_name: "gemma4:26b-thinking"
    litellm_params:
      model: ollama/gemma4:26b
      api_base: http://ollama:11434
      extra_body:
        think: true
    model_info:
      mode: chat

  - model_name: "qwen3.5:35b"
    litellm_params:
      model: ollama/qwen3.5:35b-a3b
      api_base: http://ollama:11434
      extra_body:
        think: false
    model_info:
      mode: chat

  - model_name: "qwen3.5:35b-thinking"
    litellm_params:
      model: ollama/qwen3.5:35b-a3b
      api_base: http://ollama:11434
      extra_body:
        think: true
    model_info:
      mode: chat